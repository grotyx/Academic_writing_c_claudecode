name: tests

# Run the verification-harness pytest suite on every push to main and on PRs,
# so a change that breaks check_citations / check_numbers / check_gate /
# check_coverage / format_references (etc.) is caught before it lands.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # python-docx is needed by the DOCX-compile tests; pytest is the runner.
          pip install pytest -r requirements.txt

      - name: Run tests
        run: python -m pytest -q
